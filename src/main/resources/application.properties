spring.application.name=cpn-backend

server.port=${PORT:8080}

# MySQL Database Config (env vars for production, fallback to local XAMPP for dev)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/cpndb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Hibernate (update ensures existing data isn't completely dropped every time)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
