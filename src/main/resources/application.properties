spring.application.name=cpn-backend

server.port=${PORT:8080}

# MySQL Database Config (env vars for production, fallback to local XAMPP for dev)
spring.datasource.url=jdbc:mysql://168.144.112.207:3306/railway?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=my-secure-password
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Hibernate (update ensures existing data isn't completely dropped every time)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.mvc.dispatch-options-request=true